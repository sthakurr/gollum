# Config for FLIP2 benchmarks using HuggingFace protein LMs (ESM2, ProtT5, t5-base).
# model_name, input_dim, pooling_method, and data_path are patched at runtime by the
# cluster script. validate_configuration() auto-corrects input_dim if needed.
data:
  class_path: gollum.data.module.BaseDataModule
  init_args:
    data_path: data/flip2/trpB/one_to_many_train.csv
    input_column: sequence
    target_column: target
    maximize: true
    exclude_top: true
    normalize_input: original
    featurizer:
      class_path: gollum.data.module.Featurizer
      init_args:
        representation: get_tokens
        model_name: facebook/esm2_t33_650M_UR50D
        pooling_method: average
    initializer:
      class_path: gollum.initialization.initializers.BOInitializer
      init_args:
        method: true_random
        n_clusters: 96
bo:
  class_path: gollum.bo.optimizer.BotorchOptimizer
  init_args:
    batch_size: 96
acquisition:
  class_path: botorch.acquisition.analytic.ExpectedImprovement
  init_args:
    maximize: True
surrogate_model:
  class_path: gollum.surrogate_models.gp.DeepGP
  init_args:
    likelihood:
      class_path: gpytorch.likelihoods.GaussianLikelihood
      init_args:
        noise_prior: null
        noise_constraint: null
        batch_shape:
          class_path: torch.Size
    covar_module:
      class_path: gpytorch.kernels.ScaleKernel
      init_args:
        base_kernel:
          class_path: gpytorch.kernels.MaternKernel
          init_args:
            nu: 2.5
            ard_num_dims: null
            batch_shape: null
            active_dims: null
            lengthscale_prior: null
            lengthscale_constraint: null
        outputscale_prior: null
        outputscale_constraint: null
        ard_num_dims: null
        batch_shape: null
        active_dims: null
        lengthscale_prior: null
        lengthscale_constraint: null
    mean_module:
      class_path: gpytorch.means.ConstantMean
    standardize: true
    normalize: false
    initial_noise_val: 1.0
    noise_constraint: 1.0e-04
    initial_outputscale_val: 1.0
    initial_lengthscale_val: 1.0
    gp_lr: 0.2
    ft_lr: 0.002
    scale_embeddings: true
    train_mll_additionally: false
    finetuning_model:
      class_path: gollum.featurization.deep.LLMFeaturizer
      init_args:
        projection_dim: 64
        from_top: true
        target_ratio: 0.25
        model_name: facebook/esm2_t33_650M_UR50D
        input_dim: 1280
        pooling_method: average
        normalize_embeddings: false
        lora_dropout: 0.2
        trainable: true
save_checkpoints: false
n_iters: 10
seed: 40
